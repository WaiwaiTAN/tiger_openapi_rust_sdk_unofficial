bind = "127.0.0.1:8765"
provider = "tiger"
cache_path = "./data/cache/market_data.sqlite"
request_timeout_seconds = 15
max_date_span_days = 3650
max_bars_per_response = 10000
acquire_quote_permission_on_startup = false

[tiger]
environment = "production"
# Optional fallback. TIGEROPEN_* environment variables have higher priority.
# credential_file = "/run/secrets/tiger_openapi_config.properties"
